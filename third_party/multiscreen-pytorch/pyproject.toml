[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "multiscreen-pytorch"
version = "0.1.0"
description = "PyTorch implementation of Multiscreen, a screening-based language model architecture (arXiv:2604.01178)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [
    { name = "diodieide" },
]
keywords = ["language-model", "transformer-alternative", "screening", "multiscreen"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "torch>=2.1",
    "numpy",
    "tqdm",
]

[project.optional-dependencies]
train = [
    "transformers>=4.30",
    "datasets>=2.14",
]
dev = [
    "pytest>=7",
    "ruff",
]
perf = [
    "triton-windows>=3.0; sys_platform == 'win32'",
    "triton>=3.0; sys_platform == 'linux'",
]

[project.urls]
Homepage = "https://github.com/dieOD/multiscreen-pytorch"
Issues = "https://github.com/dieOD/multiscreen-pytorch/issues"
Paper = "https://arxiv.org/abs/2604.01178"

[tool.setuptools.packages.find]
include = ["multiscreen*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
